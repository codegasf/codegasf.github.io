<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>codegasf | 3D Tech & Gaming Hub</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/logo.png">

  <!-- 3D and Animation Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
</head>
<body>
  
  <!-- 3D WebGL Background -->
  <canvas id="bg-canvas"></canvas>

  <div class="ui-layer">
    <header data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2">
      <div class="brand">
        <div class="logo-container">
          <!-- Fallback to text if logo.png is missing, but will try to load image -->
          <img src="assets/logo.png" alt="codegasf" onerror="this.style.display='none'">
          <h1>codegasf</h1>
        </div>
        <p class="tagline">Coding • Gaming • Software Hub</p>
      </div>
      <nav id="social-nav" class="social-nav">
        <!-- Injected via JS -->
      </nav>
    </header>

    <main>
      <section class="intro fade-in">
        <h2>Enter the Tech Matrix</h2>
        <p>Explore high-level tutorials, gaming highlights, and software architecture concepts seamlessly pulled from the codegasf universe.</p>
      </section>

      <div class="grid-layout">
        <!-- Section: Dynamic Social Posts -->
        <section class="glass-panel dynamic-feeds">
          <h3><span class="pulse-dot"></span> Live Cross-Platform Posts</h3>
          <div id="social-posts-container" class="card-grid">
            <!-- Rendered by JS from config.json -->
          </div>
        </section>

        <!-- Section: Coding Snippets (from posts.json) -->
        <section class="glass-panel code-snippets">
          <h3>Terminal / Snippets</h3>
          <div id="code-container" class="terminal-grid">
             <!-- Rendered by JS from posts.json -->
          </div>
          <div class="terminal-footer">
            <button id="load-more-btn" class="mini-btn">Expand Terminal (View All)</button>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <p>© <span id="year"></span> codegasf. Deployed via GitHub Pages.</p>
    </footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
